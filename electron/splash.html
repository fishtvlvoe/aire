<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 480px; height: 300px;
    background: linear-gradient(135deg, #1B3A6B 0%, #2563EB 100%);
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    color: white;
    -webkit-app-region: drag;
  }
  .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 8px; }
  .subtitle { font-size: 0.9rem; opacity: 0.8; margin-bottom: 40px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .status { font-size: 0.75rem; opacity: 0.6; margin-top: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="logo">AIRE</div>
  <div class="subtitle">智慧房仲文件平台</div>
  <div class="spinner"></div>
  <div class="status">正在啟動...</div>
</body>
</html>
