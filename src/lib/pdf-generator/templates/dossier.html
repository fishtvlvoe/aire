<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>不動產說明書</title>
  <link rel="stylesheet" href="dossier.css" />
  <style>
    /* 若 Puppeteer 以 dataURL 方式注入 CSS，保留此備用 @page */
    @page {
      size: A4;
      margin: 15mm 12mm 20mm 12mm;
    }
    /* ── 可填寫空白欄位 ── */
    .pdf-blank {
      border-bottom: 1px solid #333;
      min-width: 80px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <!-- ══ 頁眉 running elements（不佔正文空間） ══ -->
  <div class="page-header">
    <!-- LOGO：圖片備用顯示為文字 -->
    <img
      src="{{LOGO_PATH}}"
      alt="公司 LOGO"
      width="80"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"
    />
    <span style="display:none; font-weight:bold;">{{COMPANY_NAME_DISPLAY}}</span>
  </div>

  <div class="page-header-title">不動產說明書</div>

  <div class="page-header-page">
    <!-- 頁碼由 CSS counter 填入 -->
  </div>

  <!-- ══ 頁腳 running elements ══ -->
  <div class="page-footer-date">製表日期：{{GENERATED_DATE}}</div>

  <div class="page-footer-note">以謄本資料為準，實際權利以登記為準</div>

  <!-- ══ 主內容 ══ -->
  <main>

    <!-- 文件主標題 -->
    <h1>不動產說明書</h1>
    <p class="dossier-subtitle">{{PROPERTY_NAME}}</p>

    <!-- 物件基本資訊摘要列 -->
    <table>
      <tr>
        <th style="width:25%;">物件名稱</th>
        <td>{{PROPERTY_NAME}}</td>
        <th style="width:20%;">物件編號</th>
        <td>{{CASE_ID}}</td>
      </tr>
      <tr>
        <th>公司名稱</th>
        <td colspan="3">{{COMPANY_NAME_CELL}}</td>
      </tr>
      <tr>
        <td>承辦人：{{CASE_HANDLER}}</td>
        <td>店長：{{SHOP_MANAGER}}</td>
        <td colspan="2">經紀人：{{AGENT_NAME}}</td>
      </tr>
    </table>

    <hr />

    <!-- 16 章 Markdown 轉換後的 HTML 內容注入點 -->
    <div id="content">{{CONTENT}}</div>

  </main>

</body>
</html>
