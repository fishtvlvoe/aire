services:
  app:
    image: fishandy1213/jianan-ai:v3.0.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_PATH=/app/data/db/app.sqlite
      - NODE_ENV=production
      # 可選值：codex / claude-code / gemini / ollama
      - LLM_BACKEND=gemini
      # 雲端公開資料 API（hybrid-architecture）；未設定 → 客戶端自動 fallback 到本地查詢
      - DATA_API_URL=${DATA_API_URL:-}
    volumes:
      - type: bind
        source: ${USERPROFILE:-${HOME:-~}}/建安AI/data
        target: /app/data
      # AI 後端 token（三選一，依 LLM_BACKEND 設定使用對應的）
      - type: bind
        source: ${USERPROFILE:-${HOME:-~}}/.codex
        target: /home/nextjs/.codex
      - type: bind
        source: ${HOME:-~}/.gemini
        target: /home/nextjs/.gemini
      - type: bind
        source: ${HOME:-~}/.claude
        target: /home/nextjs/.claude
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
