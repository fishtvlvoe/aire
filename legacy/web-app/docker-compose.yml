version: '3.8'
services:
  app:
    build: .
    image: fishandy1213/AIRE:latest
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ~/.superset/bin/codex:/usr/local/bin/codex:ro
      - ~/.codex:/root/.codex:ro
    restart: unless-stopped
