version: '3.8'
services:
  app:
    image: fishandy1213/AIRE:latest
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup app
    restart: unless-stopped
