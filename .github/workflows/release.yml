name: Electron Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Build Next.js
        run: npm run build

      - name: Materialize standalone symlinks (fix pdfjs-dist packaging)
        run: node scripts/materialize-standalone-symlinks.js

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Package & Publish to GitHub Releases
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
