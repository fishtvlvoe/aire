schema: spec-driven
context: |
  # 產品定位
  AIRE — OPCOS 平台底下第一個 App，服務不動產仲介業。
  桌面 App 形態（不是 Web SaaS），原因：謄本資料涉及屋主個人隱私，不能存雲端。
  目標：取代房仲助理製作「不動產說明書」的人工流程，輸入地號+地址 → 串地政 API → 補填現況 → 產出加密 PDF。
  範圍：成屋說明書 + 土地說明書（兩種）。
  授權模式：買斷制，一台電腦一組授權（NT$30,000），IP 鎖定店面。

  # Tech Stack
  - Shell: Tauri 2.x（Rust 殼，跨平台桌面打包，安裝檔 5-15MB）
  - UI: Next.js 16 (App Router, React 19) + TypeScript
  - 本機資料庫: SQLite（rusqlite，存所有案件資料，零雲端）
  - PDF 產出: 評估中（候選：pdf-lib / react-pdf / pdfmake）
  - 樣式: Tailwind CSS
  - 雲端對接: HTTP REST 呼叫 OPCOS 平台（序號驗證、IP 驗證、自動更新）
  - 地政 API: cop.land.moi.gov.tw（電子謄本）+ Twinkle Hub（實價登錄）— 客戶自付 Key

  # 部署方式
  - 打包：Tauri build → Windows .msi / .exe + macOS .dmg / .app
  - 安裝：前期 Fish 到客戶店裡現場安裝，未來開放 OPCOS 線上下載
  - 自動更新：Tauri updater，更新伺服器架在 OPCOS 雲端
  - 目標平台：Windows 為主（多數客戶用 Windows），macOS 為輔

  # 目錄結構
  - src/ — Next.js (App Router、UI、表單)
  - src-tauri/ — Rust 殼（IPC、SQLite、本機檔案、序號/IP 驗證、地政 API 呼叫）
  - src-tauri/migrations/ — SQLite schema migrations
  - resources/ — 說明書 PDF 底板（19 頁固定格式）

  # 安全與權限
  - 序號鎖定 + IP 鎖定（只能在店面網路用，外面無法啟動）
  - 案件資料全存本機 SQLite，連網僅用於 API + 序號驗證
  - PDF 加密（密碼由老闆設定，業務員拿紙本，數位檔打不開）
  - 角色分層：老闆（看全部、設密碼、印 PDF）/ 助理（輸入、產 PDF 但不能開啟）/ 業務員（只拿紙本）

  # 使用流程（7 步）
  1. 助理輸入地號 + 地址
  2. 系統串地政 API 自動拉謄本，能填的先填
  3. 印出現況調查表（紙本，空欄位讓業務員現場勾選）
  4. 業務員拿紙本去現場勾選 → 帶回店裡
  5. 助理把勾選結果輸入 AIRE
  6. 系統產出加密 PDF
  7. 老闆開 PDF（用密碼）→ 列印紙本給業務員

  # 程式碼規範
  - 程式碼英文 + 註解繁中
  - UI 文案全繁中（臺灣用語）
  - commit message 遵守 conventional commits + 繁中描述
  - 不寫死 mock 客戶資料；測試用合成資料

  # 資料與隱私
  - SQLite 檔案不進 git（.gitignore 必含 *.db、*.sqlite）
  - 客戶 API Key 存本機加密儲存（Tauri stronghold 或 OS keychain），不寫進 git
  - 不上傳任何屋主個資到雲端

# ─────────────────────────────────────────────────────────────────────
rules:
  proposal:
    - 以繁體中文撰寫
    - Why 段落限 1-3 句話，說明問題與急迫性
    - What Changes 用 bullet list，每條以動詞起頭（新增/修改/移除），具體到檔案或 API 層級
    - 破壞性變更必須加粗標示 **BREAKING**
    - Non-Goals 段落必填：明確列出本次不做的事，避免 scope creep
    - Capabilities 章節要與 specs/ 目錄的名稱完全一致（kebab-case）
    - Impact 段落必含：Affected specs、Affected code、Dependencies 新增、環境變數新增

  design:
    - 以繁體中文撰寫
    - 僅在以下情況建立：跨模組變更、新外部依賴、新資料模型、效能或安全複雜度高
    - Decisions 每條必須包含 Alternatives Considered（至少列 2 個被否決的方案 + 理由）
    - Risks / Trade-offs 用「[Risk] → Mitigation」格式
    - Migration Plan 必含部署步驟 + 回滾策略
    - 禁用「可能」「或許」「看情況」；不確定的事放進 Open Questions 明列
    - 涉及時區的邏輯必須明確寫 Asia/Taipei，禁止用「當地時間」
    - 涉及 DB schema 必須列 SQL DDL 含 index

  specs:
    - 使用英文撰寫（normative language：SHALL / MUST / WHEN / THEN）
    - 每個 Requirement 至少一個 Scenario，Scenario 用 WHEN/THEN 格式
    - Scenario 用 exactly 4 hashtags（####），使用 3 個或 bullet 會 silently fail
    - 禁用 should / may / might / consider / possibly / TBD / TODO
    - MODIFIED 需求必須複製完整 requirement block 再編輯，不可只寫 delta
    - 邊界條件必寫：空輸入、最大限制、錯誤情境
    - 每個涉及 API 的 requirement 必須明確標示 HTTP method + path + status code

  tasks:
    - 以繁體中文撰寫
    - 每個 task 用 checkbox 格式：`- [ ] X.Y 任務描述`
    - 每個 task 必須標記 `[Tool: <agent>]`（codex / copilot-codex / copilot-gen / cursor / kimi / sonnet）
    - 可並行任務加 `[P]` 標記
    - 每個 task 描述必須包含對應的 spec Requirement name 或 design Decision 標題（analyzer 做 substring 比對）
    - 每個 task 粒度：單人 30 分鐘內完成
    - TDD 模式下測試任務必須在實作任務之前
    - Review 任務獨立成 group，指派 kimi MCP 處理多檔分析
    - 部署任務必列於最末 group
